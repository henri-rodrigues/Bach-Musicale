<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bach Musicale | Instrumentos de Excelência</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    /* --- Global Reset & Base Styles --- */
    :root {
      --color-primary: #C7AA8D;
      --color-primary-dark: #A98E70;
      --color-text-dark: #2C2C2C;
      --color-text-medium: #6C6C6C;
      --color-bg-light: #FBF8F5;
      --color-bg-medium: #F0EDE9;
      --color-white: #FFFFFF;
      --color-footer-bg: #1A1A1A;
      --color-discount: #CC4444;
      --color-star: #FFD700;
      --font-heading: 'Cormorant Garamond', serif;
      --font-body: 'Inter', sans-serif;
      --shadow-subtle: 0 5px 20px rgba(0, 0, 0, 0.08);
      --shadow-elevated: 0 10px 35px rgba(0, 0, 0, 0.15);
      --transition-ease: all 0.3s ease-in-out;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      color: var(--color-text-dark);
      background-color: var(--color-bg-light);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; transition: var(--transition-ease); }
    a:hover { color: var(--color-primary); }

    h1, h2, h3, h4 { font-family: var(--font-heading); color: var(--color-text-dark); font-weight: 600; }

    h2 {
      font-size: 3.2rem;
      margin-bottom: 4rem;
      text-align: center;
      position: relative;
      letter-spacing: 0.05em;
    }

    h2::after {
      content: '';
      display: block;
      width: 80px;
      height: 1.5px;
      background-color: var(--color-primary);
      margin: 20px auto 0;
      opacity: 0.7;
    }

    /* --- Header --- */
    #main-header {
      background-color: var(--color-white);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-subtle);
    }

    .header-inner {
      width: 100%;
      max-width: 1600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 3rem;
    }

    .logo { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.08em; white-space: nowrap; }

    .main-nav .nav-list { display: flex; list-style: none; gap: 3rem; }
    .main-nav .nav-item a { font-weight: 500; display: flex; align-items: center; gap: 0.4rem; position: relative; }

    /* Submenu */
    .nav-item.has-submenu { position: relative; }
    .submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: -15%;
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow-elevated);
      border-radius: 8px;
      list-style: none;
      animation: fadeIn 0.3s ease-out forwards;
      border-top: 3px solid var(--color-primary);
    }
    .nav-item.has-submenu:hover .submenu { display: block; }
    .submenu li a { padding: 0.75rem 1.5rem; white-space: nowrap; }

    /* --- Hero --- */
    .hero {
      position: relative;
      background-image: url('./image/FUNDO.jpg');
      background-size: cover;
      background-position: center;
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-overlay { background-color: rgba(20, 14, 9, 0.55); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .hero-content { text-align: center; color: #fff7ef; max-width: 700px; padding: 20px; animation: fadeInUp 1s ease forwards; }
    .hero-content h1 { color: #FFFFFF; font-size: 42px; margin-bottom: 20px; }

    .cta-button {
      padding: 12px 26px;
      background-color: #b98b68;
      color: white;
      border-radius: 30px;
      font-weight: bold;
      transition: var(--transition-ease);
    }

    /* --- Categorias & Produtos --- */
    .categorias { padding: 80px 40px; text-align: center; }
    .categoria-container { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; }
    .categoria-card { width: 300px; background-color: white; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-subtle); transition: var(--transition-ease); }
    .categoria-card img { width: 100%; height: 300px; object-fit: cover; }

    .section-highlighted-products { padding: 7rem 3rem; background-color: var(--color-bg-medium); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 3rem; }
    .product-card { background-color: var(--color-white); border-radius: 8px; overflow: hidden; transition: var(--transition-ease); }
    .product-image-wrapper img { width: 100%; height: 280px; object-fit: contain; padding: 1rem; }

    /* --- Footer --- */
    .main-footer { background-color: var(--color-footer-bg); color: #E0E0E0; padding: 4.5rem 3rem 2rem; }
    .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 3rem; max-width: 1600px; margin: 0 auto; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    /* Estilos Mobile */
    @media (max-width: 768px) {
      .header-inner { flex-direction: column; }
      .main-nav .nav-list { flex-direction: column; gap: 1rem; }
    }
  </style> </head>

<body>

  <header id="main-header">
    <div class="header-inner">
      <a href="#" class="logo">Bach Musicale</a>
      <nav class="main-nav">
        <ul class="nav-list">
          <li class="nav-item has-submenu">
            <a href="cordas.html">Cordas <i class="fas fa-chevron-down nav-arrow"></i></a>
            <ul class="submenu">
              <li><a href="cordas.html#violino">Violino</a></li>
              <li><a href="cordas.html#violao">Violão</a></li>
            </ul>
          </li>
          <li class="nav-item"><a href="madeiras.html">Madeira</a></li>
          <li class="nav-item"><a href="metais.html">Metais</a></li>
          <li class="nav-item"><a href="teclas.html">Teclas</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button id="search-toggle"><i class="fas fa-search"></i></button>
        <a href="#"><i class="fas fa-shopping-cart"></i></a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-overlay">
      <div class="hero-content">
        <h1>Onde a música encontra a excelência</h1>
        <p>Instrumentos selecionados para artistas que buscam alma.</p>
        <a href="#" class="cta-button">Explorar Coleção</a>
      </div>
    </div>
  </section>

  <section class="categorias">
    <h2>Coleções em Destaque</h2>
    <div class="categoria-container">
      <div class="categoria-card">
        <img src="./image/violino.jpg" alt="Cordas" />
        <h3>Cordas</h3>
        <a href="#" class="cta-button">Ver mais</a>
      </div>
      <div class="categoria-card">
        <img src="./image/piano.jpg" alt="Teclas" />
        <h3>Teclas</h3>
        <a href="#" class="cta-button">Ver mais</a>
      </div>
    </div>
  </section>

  <footer class="main-footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h3>Bach Musicale</h3>
        <p>Excelência em cada nota.</p>
      </div>
    </div>
  </footer>

      console.log("Bach Musicale Carregado!");

    });
  </script>

</body>
</html>
